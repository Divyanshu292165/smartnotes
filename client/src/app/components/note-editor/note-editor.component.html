<!-- client/src/app/components/note-editor/note-editor.component.html -->
@if (visible) {
  <div class="modal-overlay" (click)="onOverlayClick($event)" id="note-editor-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 class="modal-title">{{ isEditing ? 'Edit Note' : 'New Note' }}</h2>
        <button class="close-btn" (click)="onClose()" aria-label="Close editor">✕</button>
      </div>

      <form class="note-form" (ngSubmit)="onSave()">
        <div class="form-group">
          <label for="note-title-input">Title</label>
          <input
            type="text"
            id="note-title-input"
            class="form-input"
            placeholder="Enter note title..."
            [(ngModel)]="title"
            name="title"
            required
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label>Content</label>
          <quill-editor
            [(ngModel)]="content"
            name="content"
            [modules]="quillModules"
            placeholder="Write your note content..."
            theme="snow"
            class="quill-rich-editor"
          ></quill-editor>
        </div>

        <div class="form-group">
          <label for="note-tags-input">Tags</label>
          <input
            type="text"
            id="note-tags-input"
            class="form-input"
            placeholder="study, personal, ideas (comma-separated)"
            [(ngModel)]="tagsInput"
            name="tags"
            autocomplete="off"
          />
          <span class="form-hint">Separate tags with commas</span>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" (click)="onClose()">Cancel</button>
          <button
            type="submit"
            class="btn btn-primary"
            id="save-note-btn"
            [disabled]="!title.trim() || isContentEmpty"
          >
            {{ isEditing ? 'Update Note' : 'Create Note' }}
          </button>
        </div>
      </form>
    </div>
  </div>
}
